<!-- Weather Dashboard - Top Right Corner Below Header -->
<div class="weather-dashboard" id="weatherDashboard">
    <!-- Weather Dashboard Header -->
    <div class="weather-header">
        <div class="weather-title">
            <svg class="weather-icon-title" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C12 2 9.5 5 9.5 9C9.5 10.933 10.567 12 12 12C13.433 12 14.5 10.933 14.5 9C14.5 5 12 2 12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 12V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 16H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M9 19H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Weather</span>
        </div>
        <button class="weather-close-btn" id="weatherCloseBtn" title="Close Weather Dashboard">×</button>
    </div>

    <!-- Weather Loading State -->
    <div class="weather-loading" id="weatherLoading">
        <div class="loading-spinner"></div>
        <p>Loading weather data...</p>
    </div>

    <!-- Weather Error State -->
    <div class="weather-error" id="weatherError" style="display: none;">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M12 8V12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="16" r="1" fill="currentColor"/>
        </svg>
        <p id="weatherErrorMessage">Failed to load weather data</p>
        <button class="retry-btn" id="weatherRetryBtn">Retry</button>
    </div>

    <!-- Weather Content -->
    <div class="weather-content" id="weatherContent" style="display: none;">
        <!-- Location Info -->
        <div class="weather-location">
            <svg class="location-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="2"/>
            </svg>
            <div class="location-text">
                <span class="location-name" id="locationName">--</span>
                <span class="location-coords" id="locationCoords">--, --</span>
            </div>
        </div>

        <!-- Main Weather Display -->
        <div class="weather-main">
            <div class="weather-icon-container">
                <img src="" alt="Weather" class="weather-main-icon" id="weatherMainIcon">
            </div>
            <div class="weather-temp-container">
                <div class="weather-temp" id="weatherTemp">--°C</div>
                <div class="weather-description" id="weatherDescription">--</div>
            </div>
        </div>

        <!-- Weather Details Grid -->
        <div class="weather-details-grid">
            <div class="weather-detail-item">
                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C12 2 9 5.5 9 9C9 10.933 10.343 12 12 12C13.657 12 15 10.933 15 9C15 5.5 12 2 12 2Z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <div class="detail-content">
                    <span class="detail-label">Feels Like</span>
                    <span class="detail-value" id="feelsLike">--°C</span>
                </div>
            </div>

            <div class="weather-detail-item">
                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2V8M12 16V22M4.93 4.93L9.17 9.17M14.83 14.83L19.07 19.07M2 12H8M16 12H22M4.93 19.07L9.17 14.83M14.83 9.17L19.07 4.93" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <div class="detail-content">
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
            </div>

            <div class="weather-detail-item">
                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9.59 4.59A2 2 0 1111 8H2M10.59 11.59A2 2 0 1012 15H2M6.59 15.59A2 2 0 118 19H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <div class="detail-content">
                    <span class="detail-label">Wind Speed</span>
                    <span class="detail-value" id="windSpeed">-- m/s</span>
                </div>
            </div>

            <div class="weather-detail-item">
                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3V5M12 19V21M5 12H3M21 12H19M6.34 6.34L4.93 4.93M19.07 19.07L17.66 17.66M6.34 17.66L4.93 19.07M19.07 4.93L17.66 6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
                </svg>
                <div class="detail-content">
                    <span class="detail-label">Pressure</span>
                    <span class="detail-value" id="pressure">-- hPa</span>
                </div>
            </div>

            <div class="weather-detail-item">
                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 12H18L15 21L9 3L6 12H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="detail-content">
                    <span class="detail-label">Visibility</span>
                    <span class="detail-value" id="visibility">-- km</span>
                </div>
            </div>

            <div class="weather-detail-item">
                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 15C3 15 5 13 9 13C13 13 15 15 19 15C21 15 21 14 21 14V6C21 6 19 8 15 8C11 8 9 6 5 6C3 6 3 7 3 7V15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="detail-content">
                    <span class="detail-label">Clouds</span>
                    <span class="detail-value" id="clouds">--%</span>
                </div>
            </div>
        </div>

        <!-- Last Updated -->
        <div class="weather-footer">
            <span class="weather-update-time" id="weatherUpdateTime">Click map to load weather</span>
        </div>
    </div>
</div>
