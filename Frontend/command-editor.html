<!-- Command Editor Panel - Top Right Below Header -->
<div id="commandEditorPanel" class="command-editor-panel">
    
    <!-- Editor Header -->
    <div class="editor-header">
        <div class="editor-title">
            <svg class="editor-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 3L4 7L8 11M16 13L20 17L16 21M12 3L8 21" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Command Editor</span>
        </div>
    </div>
    
    <!-- Editor Tabs -->
    <div class="editor-tabs">
        <button class="editor-tab active" data-tab="mission">Mission</button>
        <button class="editor-tab" data-tab="fence">Fence</button>
        <button class="editor-tab" data-tab="rally">Rally</button>
    </div>
    
    <!-- Editor Content -->
    <div class="editor-content">
        
        <!-- Mission Panel -->
        <div class="tab-panel active" id="missionPanel">
            <div class="form-group">
                <label>All Altitudes</label>
                <select class="form-control">
                    <option>Relative To Launch</option>
                    <option>Above Mean Sea Level</option>
                </select>
            </div>
            <div class="form-group">
                <label>Initial Waypoint Alt.</label>
                <input type="number" class="form-control" value="50.0" step="0.1">
            </div>
            <div class="form-group">
                <label>Default Speed</label>
                <input type="number" class="form-control" value="10.0" step="0.1">
            </div>
            <div class="form-group">
                <label>Loiter Radius</label>
                <input type="number" class="form-control" value="50.0" step="1">
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" checked>
                    Auto RTL after mission
                </label>
            </div>
        </div>
        
        <!-- Fence Panel -->
        <div class="tab-panel" id="fencePanel">
            <div class="info-message">
                <p>Fence configuration coming soon...</p>
            </div>
            <div class="form-group">
                <label>Fence Type</label>
                <select class="form-control">
                    <option>Inclusion Fence</option>
                    <option>Exclusion Fence</option>
                </select>
            </div>
            <div class="form-group">
                <label>Max Altitude</label>
                <input type="number" class="form-control" value="100.0" step="1">
            </div>
        </div>
        
        <!-- Rally Panel -->
        <div class="tab-panel" id="rallyPanel">
            <div class="info-message">
                <p>Rally points coming soon...</p>
            </div>
            <div class="form-group">
                <label>Rally Point Alt.</label>
                <input type="number" class="form-control" value="50.0" step="0.1">
            </div>
            <div class="form-group">
                <label>Rally Land Alt.</label>
                <input type="number" class="form-control" value="10.0" step="0.1">
            </div>
        </div>
        
    </div>
    
</div>
