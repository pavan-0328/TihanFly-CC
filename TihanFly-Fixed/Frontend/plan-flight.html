<!-- Plan Flight Menu Strip - Icon Buttons with Dropdown -->
<div id="planFlightMenuStrip" class="plan-flight-menu-strip">
    
    <!-- FILE BUTTON -->
    <div class="plan-menu-dropdown">
        <button class="plan-menu-btn" title="File">
            <img src="resources/flightplan.png" alt="File" class="plan-menu-icon">
            <span class="plan-menu-label">FILE</span>
        </button>
        <div class="plan-menu-content">
            <a href="#" data-action="new-mission">New Mission</a>
            <a href="#" data-action="open-mission">Open Mission</a>
            <a href="#" data-action="save-mission">Save Mission</a>
            <a href="#" data-action="save-as">Save As</a>
            <a href="#" data-action="import-kml">Import KML</a>
            <a href="#" data-action="export-kml">Export KML</a>
        </div>
    </div>
    
    <!-- TAKEOFF BUTTON -->
    <div class="plan-menu-dropdown">
        <button class="plan-menu-btn" title="Takeoff">
            <img src="resources/takeoff.svg" alt="Takeoff" class="plan-menu-icon">
            <span class="plan-menu-label">TAKEOFF</span>
        </button>
        <div class="plan-menu-content">
            <a href="#" data-action="takeoff-here">Takeoff Here</a>
            <a href="#" data-action="set-home-position">Set Home Position</a>
            <a href="#" data-action="clear-home">Clear Home</a>
        </div>
    </div>
    
    <!-- WAYPOINT BUTTON -->
    <div class="plan-menu-dropdown">
        <button class="plan-menu-btn" title="Waypoint">
            <img src="resources/Gps.svg" alt="Waypoint" class="plan-menu-icon">
            <span class="plan-menu-label">WAYPOINT</span>
        </button>
        <div class="plan-menu-content">
            <a href="#" data-action="add-waypoint">Add Waypoint</a>
            <a href="#" data-action="insert-waypoint">Insert Waypoint</a>
            <a href="#" data-action="delete-waypoint">Delete Waypoint</a>
            <a href="#" data-action="clear-all">Clear All</a>
        </div>
    </div>
    
    <!-- RETURN BUTTON -->
    <div class="plan-menu-dropdown">
        <button class="plan-menu-btn" title="Return">
            <img src="resources/rtl.svg" alt="Return" class="plan-menu-icon">
            <span class="plan-menu-label">RETURN</span>
        </button>
        <div class="plan-menu-content">
            <a href="#" data-action="return-to-launch">Return to Launch</a>
            <a href="#" data-action="land-here">Land Here</a>
        </div>
    </div>
    
    <!-- CENTER BUTTON -->
    <div class="plan-menu-dropdown">
        <button class="plan-menu-btn" title="Center">
            <img src="resources/analayze.png" alt="Center" class="plan-menu-icon">
            <span class="plan-menu-label">CENTER</span>
        </button>
        <div class="plan-menu-content">
            <a href="#" data-action="center-mission">Center Mission</a>
            <a href="#" data-action="center-vehicle">Center Vehicle</a>
            <a href="#" data-action="center-home">Center Home</a>
        </div>
    </div>
    
</div>
