<!-- Flight Control Buttons - Top Left Corner in Strip Container -->
<div class="flight-controls-strip">
    <button id="takeoffBtn" class="flight-btn takeoff-btn" title="Takeoff">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L12 16M12 2L8 6M12 2L16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 16L5 14L8 16L10 14L12 16L14 14L16 16L19 14L21 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 20H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="btn-label">TAKEOFF</span>
    </button>
    
    <button id="landBtn" class="flight-btn land-btn" title="Land">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22L12 8M12 22L8 18M12 22L16 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 8L5 10L8 8L10 10L12 8L14 10L16 8L19 10L21 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 4H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="btn-label">LAND</span>
    </button>
    
    <button id="rtlBtn" class="flight-btn rtl-btn" title="Return to Launch">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 12L3 6L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 6L12 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M15 15L18 18L21 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="btn-label">RTL</span>
    </button>
</div>
